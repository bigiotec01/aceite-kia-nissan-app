<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oil Guide</title>

<style>
body{font-family:Arial;background:#0f1115;color:#eaeaea;padding:16px}
h1{text-align:center;margin-bottom:20px}
select,button,textarea{
 width:100%;padding:14px;margin-top:12px;
 border-radius:12px;font-size:16px;border:none
}
select,textarea{background:#1c1f26;color:#fff}
button{background:#3da9fc;color:#000;font-weight:bold}
#resultado{
 background:#161a20;padding:16px;margin-top:18px;
 border-radius:12px;font-size:18px
}
#correctionBox{display:none;margin-top:12px}
footer{margin-top:35px;text-align:center;font-size:12px;opacity:.6}
</style>
</head>

<body>

<h1>🛢️ Oil Guide</h1>

<select id="brand" onchange="loadModels()">
<option value="">Marca</option>
<option value="kia">KIA</option>
<option value="nissan">NISSAN</option>
</select>

<select id="model" onchange="loadYears()">
<option value="">Modelo</option>
</select>

<select id="year">
<option value="">Año</option>
</select>

<button onclick="buscarAceite()">Ver aceite</button>

<div id="resultado"></div>

<div id="correctionBox">
<textarea placeholder="Corrección o nota del mecánico"></textarea>
<button onclick="alert('Nota guardada')">Guardar nota</button>
</div>

<footer>Versión 1.3.4 · Creado por Ismael Bigio</footer>

<script>
var kiaModels={
"Forte":years("5W-20","0W-20"),
"Forte5":years("5W-20","0W-20"),
"Soul":years("5W-20","0W-20"),
"Rio":years("5W-20","5W-20"),
"Rio5":years("5W-20","5W-20"),
"K4":{2024:"0W-20",2025:"0W-20",2026:"0W-20"},
"Optima":years("5W-20","0W-20"),
"K5":years("5W-20","0W-20"),
"Sportage":years("5W-20","0W-20"),
"Sorento":years("5W-20","0W-20"),
"Telluride":years("5W-30","5W-30"),
"Niro":years("0W-20","0W-20"),
"Niro EV":years("0W-20","0W-20"),
"Seltos":years("0W-20","0W-20"),
"Carnival":years("0W-20","0W-20"),
"Cadenza":years("5W-20","5W-20"),
"Stinger":years("5W-30","5W-30"),
"EV6":years("0W-20","0W-20")
};

var nissanModels={
"Versa":years("5W-30","0W-20"),
"Versa Note":years("5W-30","0W-20"),
"Sentra":years("5W-30","0W-20"),
"Altima":years("0W-20","0W-20"),
"Maxima":years("5W-30","5W-30"),
"Rogue":years("5W-30","0W-20"),
"Rogue Sport":years("5W-30","0W-20"),
"Murano":years("5W-30","5W-30"),
"Pathfinder":years("5W-30","0W-20"),
"Frontier":years("5W-30","5W-30"),
"Titan":years("5W-30","5W-30"),
"Kicks":years("0W-20","0W-20"),
"Juke":years("5W-30","5W-30"),
"Armada":years("5W-30","5W-30"),
"Leaf":years("0W-20","0W-20"),
"NV200":years("5W-30","5W-30")
};

function years(oldOil,newOil){
 let o={};for(let y=2015;y<=2026;y++)
 o[y]=(y<2021?oldOil:newOil);return o;
}

function loadModels(){
 let b=brand.value,m=model,y=year;
 m.innerHTML='<option>Modelo</option>';
 y.innerHTML='<option>Año</option>';
 let d=b.value=="kia"?kiaModels:nissanModels;
 for(let k in d)m.innerHTML+=`<option>${k}</option>`;
}

function loadYears(){
 let d=brand.value=="kia"?kiaModels:nissanModels;
 year.innerHTML='<option>Año</option>';
 for(let y in d[model.value])year.innerHTML+=`<option>${y}</option>`;
}

function buscarAceite(){
 let d=brand.value=="kia"?kiaModels:nissanModels;
 resultado.innerHTML="Aceite recomendado: <strong>"+d[model.value][year.value]+"</strong>";
 correctionBox.style.display="block";
}
</script>

</body>
</html>
