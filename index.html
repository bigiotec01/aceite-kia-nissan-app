<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil Guide Pro v2.4</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f1115">
    <style>
        body { margin:0; font-family: 'Segoe UI', sans-serif; background:#0f1115; color:#eaeaea; padding:16px; line-height: 1.5; }
        .header-container {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px; height: 50px; background: #161a20;
            border-radius: 12px; padding: 0 10px; border: 1px solid #333;
        }
        h1 { font-size: 15px; color:#3da9fc; margin: 0; flex-grow: 1; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        .logo-slot { width: 50px; height: 100%; display: flex; justify-content: center; align-items: center; }
        svg { width: 100%; height: auto; max-height: 20px; }
        .card { background:#1c1f26; padding:18px; border-radius:16px; border: 1px solid #333; margin-bottom: 15px; }
        select, button { width:100%; padding:14px; margin-top:10px; font-size:16px; border-radius:10px; border:none; box-sizing: border-box; }
        select { background:#2a2e38; color:#fff; border: 1px solid #444; }
        button { background:#3da9fc; color:#000; font-weight:bold; cursor:pointer; }
        #resultado { background:#161a20; padding:20px; margin-top:18px; border-radius:12px; border-left: 6px solid #3da9fc; display: none; }
        .data-value { color: #3da9fc; font-weight: bold; font-size: 22px; }
        #qrBox { display: none; margin-top: 15px; padding: 15px; background: white; border-radius: 12px; text-align: center; }
        #qrBox img { width: 160px; height: 160px; margin: 0 auto; }
        footer { margin-top:40px; text-align:center; font-size:11px; opacity:0.4; }
    </style>
</head>
<body>

    <div class="header-container">
        <div id="logoLeft" class="logo-slot"></div>
        <h1>Oil Guide Pro</h1>
        <div id="logoRight" class="logo-slot"></div>
    </div>

    <div class="card">
        <select id="brand" onchange="loadModels()">
            <option value="">-- SELECCIONAR MARCA --</option>
            <option value="kia">KIA</option>
            <option value="nissan">NISSAN</option>
        </select>
        <select id="model" onchange="loadYears()">
            <option value="">-- MODELO --</option>
        </select>
        <select id="year">
            <option value="">-- AÑO --</option>
        </select>
        <button onclick="buscarAceite()">VER RECOMENDACIÓN</button>
    </div>

    <div id="resultado"></div>

    <div class="card" style="text-align: center;">
        <button onclick="toggleQR()" style="background:#333; color:#fff; font-size:12px;">📲 COMPARTIR APP (QR)</button>
        <div id="qrBox">
            <div id="qrcode"></div>
            <p style="color:#000; font-size:12px; font-weight:bold; margin-top:10px;">Escanea para instalar</p>
        </div>
    </div>

    <button onclick="forceUpdate()" style="background:transparent; color:#3da9fc; border:1px solid #3da9fc; font-size:11px; margin-top:10px;">🔄 RESETEAR CACHÉ</button>

    <footer>Versión 2.4 · Ismael Bigio</footer>

<script>
const logos = {
    kia: `<svg viewBox="-5 -2 110 30" xmlns="http://www.w3.org/2000/svg"><path d="M25 0l-7 13.5L11 0H0l12.5 25L25 0zm25 0h-11v25h11V0zm39 0h-11l-12.5 25H53l12.5-25h11l12.5 25H100z" fill="#BB162B"/></svg>`,
    nissan: `<svg viewBox="-5 -5 110 110" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="45" fill="none" stroke="white" stroke-width="5"/><rect x="5" y="40" width="90" height="20" fill="#161a20" stroke="white" stroke-width="4"/><text x="50" y="55" font-family="Arial" font-weight="bold" font-size="14" text-anchor="middle" fill="white">NISSAN</text></svg>`
};

function oilData(v1, q1, v2, q2) {
    const obj = {};
    for (let y = 2015; y <= 2026; y++) { obj[y] = (y < 2021) ? { vis: v1, qty: q1 } : { vis: v2, qty: q2 }; }
    return obj;
}

const kiaData = {
    "Cadenza": oilData("5W-20", "5.1 qts", "5W-20", "5.1 qts"),
    "Carnival": oilData("0W-20", "6.5 qts", "0W-20", "6.5 qts"),
    "Forte": oilData("5W-20", "4.2 qts", "0W-20", "4.2 qts"),
    "K4": oilData("0W-20", "4.2 qts", "0W-20", "4.2 qts"),
    "Rio": oilData("5W-20", "3.5 qts", "5W-20", "3.7 qts"),
    "Seltos": oilData("0W-20", "4.2 qts", "0W-20", "4.2 qts"),
    "Sorento": oilData("5W-20", "6.1 qts", "0W-20", "6.1 qts"),
    "Soul": oilData("5W-20", "4.2 qts", "0W-20", "4.2 qts"),
    "Sportage": oilData("5W-20", "5.1 qts", "0W-20", "5.1 qts"),
    "Telluride": oilData("5W-30", "6.5 qts", "5W-30", "6.5 qts")
};

const nissanData = {
    "Altima": oilData("0W-20", "5.1 qts", "0W-20", "5.1 qts"),
    "Frontier": oilData("5W-30", "5.4 qts", "5W-30", "5.6 qts"),
    "Kicks": oilData("0W-20", "4.4 qts", "0W-20", "4.4 qts"),
    "Pathfinder": oilData("5W-30", "5.1 qts", "0W-20", "5.4 qts"),
    "Rogue": oilData("5W-30", "4.9 qts", "0W-20", "5.1 qts"),
    "Sentra": oilData("5W-30", "4.2 qts", "0W-20", "4.4 qts"),
    "Versa": oilData("5W-30", "3.7 qts", "0W-20", "4.2 qts"),
    "Xterra": oilData("5W-30", "5.4 qts", "5W-30", "5.4 qts")
};

function loadModels() {
    const brand = document.getElementById("brand").value;
    document.getElementById("logoLeft").innerHTML = logos[brand] || "";
    document.getElementById("logoRight").innerHTML = logos[brand] || "";
    const modelDropdown = document.getElementById("model");
    modelDropdown.innerHTML = '<option value="">-- MODELO --</option>';
    if (!brand) return;
    const models = brand === "kia" ? Object.keys(kiaData) : Object.keys(nissanData);
    models.sort().forEach(m => {
        let el = document.createElement("option");
        el.textContent = m; el.value = m;
        modelDropdown.appendChild(el);
    });
}

function loadYears() {
    const brand = document.getElementById("brand").value;
    const model = document.getElementById("model").value;
    const yearDropdown = document.getElementById("year");
    yearDropdown.innerHTML = '<option value="">-- AÑO --</option>';
    if (!model) return;
    const data = brand === "kia" ? kiaData[model] : nissanData[model];
    Object.keys(data).sort((a,b)=>b-a).forEach(y => {
        let el = document.createElement("option");
        el.textContent = y; el.value = y;
        yearDropdown.appendChild(el);
    });
}

function buscarAceite() {
    const b = document.getElementById("brand").value;
    const m = document.getElementById("model").value;
    const y = document.getElementById("year").value;
    if (!y) return;
    const info = b === "kia" ? kiaData[m][y] : nissanData[m][y];
    const resDiv = document.getElementById("resultado");
    resDiv.style.display = "block";
    resDiv.innerHTML = `ACEITE: <span class="data-value">${info.vis}</span><br>CANTIDAD: <span class="data-value">${info.qty}</span>`;
}

function toggleQR() {
    const box = document.getElementById("qrBox");
    const url = window.location.origin; // Usa la raíz del sitio
    document.getElementById("qrcode").innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${encodeURIComponent(url)}">`;
    box.style.display = box.style.display === "block" ? "none" : "block";
}

function forceUpdate() {
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(registrations => {
            for(let registration of registrations) { registration.unregister(); }
            caches.keys().then(names => {
                for (let name of names) caches.delete(name);
                alert("Memoria limpia. La app se reiniciará.");
                window.location.reload(true);
            });
        });
    }
}

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js?v=2.4').then(reg => {
            reg.onupdatefound = () => {
                const worker = reg.installing;
                worker.onstatechange = () => {
                    if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                        window.location.reload();
                    }
                };
            };
        });
    });
}
</script>
</body>
</html>
