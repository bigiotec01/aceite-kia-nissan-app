<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil Guide Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f1115">
    <style>
        body { margin:0; font-family:Arial, sans-serif; background:#0f1115; color:#eaeaea; padding:16px; line-height: 1.5; }
        h1 { text-align:center; color:#3da9fc; margin-bottom:20px; }
        select, button, textarea { 
            width:100%; padding:16px; margin-top:12px; font-size:16px; 
            border-radius:12px; border:none; box-sizing: border-box; 
        }
        select, textarea { background:#1c1f26; color:#fff; border: 1px solid #333; }
        button { background:#3da9fc; color:#000; font-weight:bold; cursor:pointer; transition: 0.3s; }
        button:active { transform: scale(0.98); opacity: 0.8; }
        #resultado { 
            background:#161a20; padding:20px; margin-top:18px; 
            border-radius:12px; font-size:18px; border-left: 5px solid #3da9fc;
            display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .data-label { color: #888; font-size: 14px; display: block; margin-top: 8px; }
        .data-value { color: #3da9fc; font-weight: bold; font-size: 20px; }
        #correctionBox { display:none; margin-top:14px; }
        footer { margin-top:40px; text-align:center; font-size:12px; opacity:0.5; }
    </style>
</head>
<body>

    <h1>🛢️ Oil Guide Pro</h1>

    <select id="brand" onchange="loadModels()">
        <option value="">-- Seleccionar Marca --</option>
        <option value="kia">KIA</option>
        <option value="nissan">NISSAN</option>
    </select>

    <select id="model" onchange="loadYears()">
        <option value="">-- Modelo --</option>
    </select>

    <select id="year">
        <option value="">-- Año --</option>
    </select>

    <button onclick="buscarAceite()">VER RECOMENDACIÓN</button>

    <div id="resultado"></div>

    <div id="correctionBox">
        <textarea id="note" placeholder="Escribe aquí una nota o corrección técnica..."></textarea>
        <button onclick="guardarNota()" style="background:#2ecc71;">GUARDAR NOTA</button>
    </div>

    <footer>Versión 1.5 · Ismael Bigio</footer>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(err => console.log("Error SW:", err));
}

// Nueva función generadora con Cantidades (Capacidad aproximada)
function oilData(v1, q1, v2, q2) {
    const obj = {};
    for (let y = 2015; y <= 2026; y++) { 
        if (y < 2021) {
            obj[y] = { vis: v1, qty: q1 };
        } else {
            obj[y] = { vis: v2, qty: q2 };
        }
    }
    return obj;
}

const kiaData = {
    "Forte": oilData("5W-20", "4.2 qts", "0W-20", "4.2 qts"),
    "Rio": oilData("5W-20", "3.5 qts", "5W-20", "3.7 qts"),
    "Sportage": oilData("5W-20", "5.1 qts", "0W-20", "5.1 qts"),
    "Sorento": oilData("5W-20", "6.1 qts", "0W-20", "6.1 qts"),
    "Soul": oilData("5W-20", "4.2 qts", "0W-20", "4.2 qts"),
    "Telluride": oilData("5W-30", "6.5 qts", "5W-30", "6.5 qts"),
    "Seltos": oilData("0W-20", "4.2 qts", "0W-20", "4.2 qts"),
    "K5": oilData("5W-20", "5.1 qts", "0W-20", "5.1 qts"),
    "Carnival": oilData("0W-20", "6.5 qts", "0W-20", "6.5 qts")
};

const nissanData = {
    "Altima": oilData("0W-20", "5.1 qts", "0W-20", "5.1 qts"),
    "Sentra": oilData("5W-30", "4.2 qts", "0W-20", "4.4 qts"),
    "Versa": oilData("5W-30", "3.7 qts", "0W-20", "4.2 qts"),
    "Rogue": oilData("5W-30", "4.9 qts", "0W-20", "5.1 qts"),
    "Frontier": oilData("5W-30", "5.4 qts", "5W-30", "5.6 qts"),
    "Pathfinder": oilData("5W-30", "5.1 qts", "0W-20", "5.4 qts"),
    "Kicks": oilData("0W-20", "4.4 qts", "0W-20", "4.4 qts"),
    "Titan": oilData("5W-30", "6.9 qts", "5W-30", "6.9 qts"),
    "Armada": oilData("5W-30", "6.9 qts", "5W-30", "6.9 qts")
};

function loadModels() {
    const brand = document.getElementById("brand").value;
    const modelDropdown = document.getElementById("model");
    const yearDropdown = document.getElementById("year");
    modelDropdown.innerHTML = '<option value="">-- Modelo --</option>';
    yearDropdown.innerHTML = '<option value="">-- Año --</option>';
    document.getElementById("resultado").style.display = "none";
    document.getElementById("correctionBox").style.display = "none";
    if (!brand) return;
    const models = brand === "kia" ? Object.keys(kiaData) : Object.keys(nissanData);
    models.sort().forEach(m => {
        let el = document.createElement("option");
        el.textContent = m; el.value = m;
        modelDropdown.appendChild(el);
    });
}

function loadYears() {
    const brand = document.getElementById("brand").value;
    const model = document.getElementById("model").value;
    const yearDropdown = document.getElementById("year");
    yearDropdown.innerHTML = '<option value="">-- Año --</option>';
    if (!model) return;
    const data = brand === "kia" ? kiaData[model] : nissanData[model];
    Object.keys(data).forEach(y => {
        let el = document.createElement("option");
        el.textContent = y; el.value = y;
        yearDropdown.appendChild(el);
    });
}

function buscarAceite() {
    const b = document.getElementById("brand").value;
    const m = document.getElementById("model").value;
    const y = document.getElementById("year").value;
    const resDiv = document.getElementById("resultado");

    if (!y) { alert("Por favor selecciona todos los campos"); return; }

    const info = b === "kia" ? kiaData[m][y] : nissanData[m][y];
    const storageKey = `note_${b}_${m}_${y}`;
    const savedNote = localStorage.getItem(storageKey) || "";

    resDiv.style.display = "block";
    resDiv.innerHTML = `
        <span class="data-label">VISCOSIDAD RECOMENDADA:</span>
        <span class="data-value">${info.vis}</span>
        <br>
        <span class="data-label">CANTIDAD (CAPACIDAD):</span>
        <span class="data-value">${info.qty}</span>
    `;
    
    if (savedNote) {
        resDiv.innerHTML += `<div style="margin-top:15px; padding-top:10px; border-top:1px solid #333; font-size:14px; color:#2ecc71;"><strong>Nota:</strong> ${savedNote}</div>`;
    }

    document.getElementById("note").value = savedNote;
    document.getElementById("correctionBox").style.display = "block";
}

function guardarNota() {
    const b = document.getElementById("brand").value;
    const m = document.getElementById("model").value;
    const y = document.getElementById("year").value;
    const text = document.getElementById("note").value;
    if (!y) return;
    localStorage.setItem(`note_${b}_${m}_${y}`, text);
    alert("¡Nota guardada!");
    buscarAceite();
}
</script>
</body>
</html>
