<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aceite Kia & Nissan USA</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0f1a">

<style>
body{
  font-family:system-ui,-apple-system,Arial;
  background:#0b0f1a;
  color:#eaeaf0;
  padding:20px
}
h1{text-align:center;color:#6cf}
select,button,input{
  width:100%;
  padding:14px;
  margin:10px 0;
  font-size:16px;
  border-radius:10px;
  border:none
}
button{
  background:#6cf;
  color:#000;
  font-weight:bold
}
.resultado{
  background:#12182b;
  padding:16px;
  border-radius:12px;
  margin-top:16px;
  line-height:1.6
}
footer{
  text-align:center;
  margin-top:30px;
  font-size:13px;
  color:#9aa4c7
}
</style>
</head>

<body>

<h1>🛢️ Aceite Recomendado<br>Kia & Nissan (USA)</h1>

<select id="marca">
  <option value="" disabled selected>Marca</option>
  <option value="kia">Kia</option>
  <option value="nissan">Nissan</option>
</select>

<select id="modelo">
  <option value="" disabled selected>Modelo</option>
</select>

<select id="anio">
  <option value="" disabled selected>Año</option>
</select>

<button onclick="mostrar()">Ver aceite</button>

<div id="salida" class="resultado"></div>

<input id="override" placeholder="Corregir aceite (ej: 0W-20)">
<button onclick="guardarOverride()">Guardar corrección</button>

<footer>
  Creado por Ismael Bigio · Herramienta técnica independiente
</footer>

<script>
const DATA={
kia:{
"Rio":{from:2015,to:2023,oil:"0W-20 / 5W-20"},
"Forte":{from:2015,to:2023,oil:"0W-20"},
"K4":{from:2024,to:2025,oil:"0W-20"},
"Soul":{from:2015,to:2024,oil:"0W-20 / 5W-30"},
"Optima":{from:2015,to:2020,oil:"0W-20 / 5W-30"},
"K5":{from:2021,to:2024,oil:"0W-20"},
"Sportage":{from:2015,to:2024,oil:"0W-20 / 5W-30"},
"Sorento":{from:2015,to:2024,oil:"0W-20 / 5W-30"},
"Telluride":{from:2020,to:2024,oil:"0W-20"},
"Seltos":{from:2021,to:2024,oil:"0W-20"},
"Niro":{from:2017,to:2024,oil:"0W-20"},
"Stinger":{from:2018,to:2023,oil:"5W-30"},
"Cadenza":{from:2015,to:2020,oil:"5W-30"},
"Carnival":{from:2022,to:2024,oil:"0W-20"},
"EV6":{from:2022,to:2024,oil:"⚡ Eléctrico – no usa aceite"}
},
nissan:{
"Versa":{from:2015,to:2024,oil:"0W-20"},
"Sentra":{from:2015,to:2024,oil:"0W-20"},
"Altima":{from:2015,to:2024,oil:"0W-20 / 5W-30"},
"Maxima":{from:2015,to:2023,oil:"5W-30"},
"Rogue":{from:2015,to:2024,oil:"0W-20"},
"Rogue Sport":{from:2017,to:2022,oil:"0W-20"},
"Murano":{from:2015,to:2024,oil:"0W-20"},
"Pathfinder":{from:2015,to:2024,oil:"0W-20"},
"Armada":{from:2017,to:2024,oil:"0W-20"},
"Frontier":{from:2015,to:2024,oil:"0W-20"},
"Titan":{from:2015,to:2024,oil:"0W-20"},
"NV200":{from:2015,to:2021,oil:"0W-20"},
"Kicks":{from:2018,to:2024,oil:"0W-20"},
"Leaf":{from:2015,to:2024,oil:"⚡ Eléctrico – no usa aceite"},
"Z":{from:2015,to:2024,oil:"5W-30"}
}
};

const marcaSel=document.getElementById("marca");
const modeloSel=document.getElementById("modelo");
const anioSel=document.getElementById("anio");
const salida=document.getElementById("salida");

marcaSel.onchange=()=>{
  modeloSel.innerHTML="<option disabled selected>Modelo</option>";
  anioSel.innerHTML="<option disabled selected>Año</option>";
  salida.innerHTML="";
  Object.keys(DATA[marcaSel.value]).forEach(m=>{
    modeloSel.innerHTML+=`<option>${m}</option>`;
  });
};

modeloSel.onchange=()=>{
  anioSel.innerHTML="<option disabled selected>Año</option>";
  const d=DATA[marcaSel.value][modeloSel.value];
  for(let y=d.from;y<=d.to;y++){
    anioSel.innerHTML+=`<option>${y}</option>`;
  }
};

function claveActual(){
  return `${marcaSel.value}-${modeloSel.value}-${anioSel.value}`;
}

function mostrar(){
  if(!anioSel.value){
    salida.innerHTML="⚠️ Selecciona todos los campos.";
    return;
  }
  const d=DATA[marcaSel.value][modeloSel.value];
  const guardado=localStorage.getItem(claveActual());
  const aceiteFinal=guardado || d.oil;

  salida.innerHTML=`
    <strong>${marcaSel.value.toUpperCase()} ${modeloSel.value} ${anioSel.value}</strong><br><br>
    🛢️ <b>Aceite recomendado:</b> ${aceiteFinal}<br>
    <small>${guardado ? "✔️ Corrección manual guardada" : "*Base general mercado USA."}</small>
  `;
}

function guardarOverride(){
  const valor=document.getElementById("override").value.trim();
  if(!valor) return;
  localStorage.setItem(claveActual(), valor);
  document.getElementById("override").value="";
  mostrar();
}

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
