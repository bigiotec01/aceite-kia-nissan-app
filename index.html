<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aceite por VIN | Kia & Nissan USA</title>

<style>
body{font-family:system-ui,-apple-system,Arial;background:#0b0f1a;color:#eaeaf0;padding:20px}
h1{text-align:center;color:#6cf}
input,select,button{
  width:100%;padding:14px;margin:10px 0;
  font-size:16px;border-radius:10px;border:none
}
button{background:#6cf;color:#000;font-weight:bold}
.resultado{background:#12182b;padding:16px;border-radius:12px;margin-top:16px;line-height:1.6}
small{color:#9aa4c7}
</style>
</head>

<body>

<h1>🔍 Búsqueda por VIN<br>Kia & Nissan (USA)</h1>

<input id="vin" placeholder="VIN (17 caracteres)" maxlength="17" autocapitalize="characters">

<button onclick="buscarVIN()">Buscar por VIN</button>

<hr style="opacity:.2">

<select id="marca">
  <option value="" disabled selected>Marca</option>
  <option value="kia">Kia</option>
  <option value="nissan">Nissan</option>
</select>

<select id="modelo">
  <option value="" disabled selected>Modelo</option>
</select>

<select id="anio">
  <option value="" disabled selected>Año</option>
</select>

<button onclick="mostrar()">Ver aceite</button>

<div id="salida" class="resultado"></div>

<script>
// ===== BASE DE ACEITES (MISMA QUE YA TENÍAS) =====
const DATA={
kia:{
"Rio":{from:2015,to:2023,oil:"0W-20 / 5W-20"},
"Forte":{from:2015,to:2023,oil:"0W-20"},
"K4":{from:2024,to:2025,oil:"0W-20"},
"Soul":{from:2015,to:2024,oil:"0W-20 / 5W-30"},
"Optima":{from:2015,to:2020,oil:"0W-20 / 5W-30"},
"K5":{from:2021,to:2024,oil:"0W-20"},
"Sportage":{from:2015,to:2024,oil:"0W-20 / 5W-30"},
"Sorento":{from:2015,to:2024,oil:"0W-20 / 5W-30"},
"Telluride":{from:2020,to:2024,oil:"0W-20"},
"Seltos":{from:2021,to:2024,oil:"0W-20"},
"Niro":{from:2017,to:2024,oil:"0W-20"},
"Stinger":{from:2018,to:2023,oil:"5W-30"},
"Carnival":{from:2022,to:2024,oil:"0W-20"}
},
nissan:{
"Versa":{from:2015,to:2024,oil:"0W-20"},
"Sentra":{from:2015,to:2024,oil:"0W-20"},
"Altima":{from:2015,to:2024,oil:"0W-20 / 5W-30"},
"Maxima":{from:2015,to:2023,oil:"5W-30"},
"Rogue":{from:2015,to:2024,oil:"0W-20"},
"Murano":{from:2015,to:2024,oil:"0W-20"},
"Pathfinder":{from:2015,to:2024,oil:"0W-20"},
"Frontier":{from:2015,to:2024,oil:"0W-20"},
"Armada":{from:2017,to:2024,oil:"0W-20"},
"Kicks":{from:2018,to:2024,oil:"0W-20"}
}
};

// ===== DECODIFICACIÓN VIN =====
const YEAR_MAP={
F:2015,G:2016,H:2017,J:2018,K:2019,L:2020,
M:2021,N:2022,P:2023,R:2024,S:2025
};

function validarVIN(v){
  return /^[A-HJ-NPR-Z0-9]{17}$/.test(v);
}

function buscarVIN(){
  const vin=document.getElementById("vin").value.toUpperCase();
  const salida=document.getElementById("salida");

  if(!validarVIN(vin)){
    salida.innerHTML="❌ VIN inválido (17 caracteres, sin I O Q).";
    return;
  }

  const wmi=vin.substring(0,3);
  const yearCode=vin[9];
  const year=YEAR_MAP[yearCode];

  let marca="";
  if(wmi.startsWith("K")) marca="kia";
  if(wmi.startsWith("1N")||wmi.startsWith("JN")) marca="nissan";

  if(!marca || !year){
    salida.innerHTML="⚠️ VIN válido pero no reconocido automáticamente.";
    return;
  }

  // Auto-selección marca
  document.getElementById("marca").value=marca;
  cargarModelos(marca);

  salida.innerHTML=`✔️ VIN válido<br>Marca: ${marca.toUpperCase()}<br>Año estimado: ${year}<br>
  <small>Selecciona el modelo para confirmar aceite.</small>`;
}

function cargarModelos(marca){
  const modeloSel=document.getElementById("modelo");
  modeloSel.innerHTML="<option disabled selected>Modelo</option>";
  Object.keys(DATA[marca]).forEach(m=>{
    modeloSel.innerHTML+=`<option>${m}</option>`;
  });
}

document.getElementById("marca").onchange=e=>{
  cargarModelos(e.target.value);
};

document.getElementById("modelo").onchange=e=>{
  const marca=document.getElementById("marca").value;
  const d=DATA[marca][e.target.value];
  const anioSel=document.getElementById("anio");
  anioSel.innerHTML="<option disabled selected>Año</option>";
  for(let y=d.from;y<=d.to;y++){
    anioSel.innerHTML+=`<option>${y}</option>`;
  }
};

function mostrar(){
  const marca=document.getElementById("marca").value;
  const modelo=document.getElementById("modelo").value;
  const anio=document.getElementById("anio").value;

  if(!marca||!modelo||!anio){
    salida.innerHTML="⚠️ Completa todos los campos.";
    return;
  }

  const d=DATA[marca][modelo];
  salida.innerHTML=`
    <strong>${marca.toUpperCase()} ${modelo} ${anio}</strong><br><br>
    🛢️ <b>Aceite recomendado:</b> ${d.oil}<br>
    <small>*VIN usado como guía. Para motor exacto → API oficial.</small>
  `;
}
</script>

</body>
</html>
