<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil Guide Pro v2.3.4</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f1115">
    <style>
        body { margin:0; font-family: 'Segoe UI', sans-serif; background:#0f1115; color:#eaeaea; padding:16px; line-height: 1.5; }
        
        .header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            height: 50px;
            background: #161a20;
            border-radius: 12px;
            padding: 0 10px;
        }
        h1 { font-size: 16px; color:#3da9fc; margin: 0; flex-grow: 1; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        .logo-slot { width: 60px; height: 100%; display: flex; justify-content: center; align-items: center; }
        svg { width: 100%; height: auto; max-height: 22px; transition: 0.3s; }

        .card { background:#1c1f26; padding:18px; border-radius:16px; border: 1px solid #333; margin-bottom: 15px; }
        select, button, textarea { 
            width:100%; padding:14px; margin-top:10px; font-size:16px; 
            border-radius:10px; border:none; box-sizing: border-box; 
        }
        select, textarea { background:#2a2e38; color:#fff; border: 1px solid #444; }
        button { background:#3da9fc; color:#000; font-weight:bold; cursor:pointer; transition: 0.3s; }
        
        /* Sección QR */
        #qrBox { display: none; text-align: center; margin-top: 10px; padding: 10px; background: #fff; border-radius: 12px; }
        #qrBox img { width: 150px; height: 150px; }
        #qrBox p { color: #000; font-size: 12px; font-weight: bold; margin-top: 5px; }

        .btn-update { background:#1c1f26; color:#3da9fc; border: 1px solid #3da9fc; margin-top: 5px; font-size: 11px; padding: 6px; }
        .btn-qr { background: #555; color: #fff; font-size: 12px; margin-top: 10px; }
        
        #resultado { 
            background:#161a20; padding:20px; margin-top:18px; 
            border-radius:12px; border-left: 6px solid #3da9fc;
            display: none;
        }
        .data-label { color: #888; font-size: 13px; display: block; margin-top: 10px; }
        .data-value { color: #3da9fc; font-weight: bold; font-size: 22px; }
        
        .hist-item { background: #252932; padding: 12px; border-radius: 8px; margin-bottom: 8px; font-size: 14px; border-left: 3px solid #3da9fc; }
        footer { margin-top:40px; text-align:center; font-size:12px; opacity:0.4; padding-bottom: 20px; }
    </style>
</head>
<body>

    <div class="header-container">
        <div id="logoLeft" class="logo-slot"></div>
        <h1>Oil Guide Pro</h1>
        <div id="logoRight" class="logo-slot"></div>
    </div>

    <div class="card">
        <select id="brand" onchange="loadModels()">
            <option value="">-- MARCA --</option>
            <option value="kia">KIA</option>
            <option value="nissan">NISSAN</option>
        </select>
        <select id="model" onchange="loadYears()">
            <option value="">-- MODELO --</option>
        </select>
        <select id="year">
            <option value="">-- AÑO --</option>
        </select>
        <button onclick="buscarAceite()">CONSULTAR DATOS</button>
    </div>

    <div id="resultado"></div>

    <div class="card" style="text-align: center;">
        <button class="btn-qr" onclick="toggleQR()">📲 COMPARTIR APP (QR)</button>
        <div id="qrBox">
            <div id="qrcode"></div>
            <p>Escanea para descargar</p>
        </div>
    </div>

    <div class="card" style="border-color: #3da9fc; padding: 8px;">
        <button class="btn-update" onclick="checkUpdates()">🔄 ACTUALIZAR APP</button>
    </div>

    <div id="historialSection">
        <h3 style="color:#888; font-size:14px;">Consultas Recientes</h3>
        <div id="listaHistorial"></div>
    </div>

    <footer>Versión 2.3.4 · Ismael Bigio</footer>

<script>
const logos = {
    kia: `<svg viewBox="-5 -2 110 30" xmlns="http://www.w3.org/2000/svg"><path d="M25 0l-7 13.5L11 0H0l12.5 25L25 0zm25 0h-11v25h11V0zm39 0h-11l-12.5 25H53l12.5-25h11l12.5 25H100z" fill="#BB162B"/></svg>`,
    nissan: `<svg viewBox="-5 -5 110 110" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="45" fill="none" stroke="white" stroke-width="5"/><rect x="5" y="40" width="90" height="20" fill="#161a20" stroke="white" stroke-width="4"/><text x="50" y="55" font-family="Arial" font-weight="bold" font-size="14" text-anchor="middle" fill="white">NISSAN</text></svg>`
};

// Función para mostrar/ocultar QR
function toggleQR() {
    const box = document.getElementById("qrBox");
    const qrContainer = document.getElementById("qrcode");
    const url = window.location.href;
    
    if (box.style.display === "block") {
        box.style.display = "none";
    } else {
        // Genera el QR usando la URL actual de Vercel
        qrContainer.innerHTML = `<img src="https://chart.googleapis.com/chart?chs=150x150&cht=qr&chl=${encodeURIComponent(url)}&choe=UTF-8" alt="QR Code">`;
        box.style.display = "block";
    }
}

// ... (Aquí va el resto de tu base de datos y funciones de KIA/Nissan de la v2.3.3) ...
// (Asegúrate de copiar kiaData, nissanData, loadModels, loadYears, buscarAceite del código anterior)

function loadModels() {
    const brand = document.getElementById("brand").value;
    const modelDropdown = document.getElementById("model");
    const left = document.getElementById("logoLeft");
    const right = document.getElementById("logoRight");
    modelDropdown.innerHTML = '<option value="">-- MODELO --</option>';
    left.innerHTML = logos[brand] || "";
    right.innerHTML = logos[brand] || "";
    if (!brand) return;
    const models = brand === "kia" ? Object.keys(kiaData) : Object.keys(nissanData);
    models.sort().forEach(m => {
        let el = document.createElement("option");
        el.textContent = m; el.value = m;
        modelDropdown.appendChild(el);
    });
}

// (Sigue el resto del script de la v2.3.3 hasta el final)
</script>
</body>
</html>
