<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil Guide Pro v2.3</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f1115">
    <style>
        body { margin:0; font-family: 'Segoe UI', sans-serif; background:#0f1115; color:#eaeaea; padding:16px; line-height: 1.5; }
        h1 { text-align:center; color:#3da9fc; margin-bottom:10px; font-size: 26px; }
        #logoContainer { height: 70px; display: flex; justify-content: center; align-items: center; margin-bottom: 15px; }
        svg { width: 140px; height: auto; }
        .card { background:#1c1f26; padding:18px; border-radius:16px; border: 1px solid #333; margin-bottom: 15px; }
        select, button, textarea { width:100%; padding:14px; margin-top:10px; font-size:16px; border-radius:10px; border:none; box-sizing: border-box; }
        select, textarea { background:#2a2e38; color:#fff; border: 1px solid #444; }
        button { background:#3da9fc; color:#000; font-weight:bold; cursor:pointer; transition: 0.3s; }
        button:active { transform: scale(0.97); }
        .btn-green { background:#2ecc71; color: white; }
        .btn-update { background:#1c1f26; color:#3da9fc; border: 1px solid #3da9fc; margin-top: 5px; }
        #resultado { background:#161a20; padding:20px; margin-top:18px; border-radius:12px; border-left: 6px solid #3da9fc; display: none; }
        .data-label { color: #888; font-size: 13px; display: block; margin-top: 10px; }
        .data-value { color: #3da9fc; font-weight: bold; font-size: 22px; }
        .hist-item { background: #252932; padding: 12px; border-radius: 8px; margin-bottom: 8px; font-size: 14px; border-left: 3px solid #3da9fc; }
        footer { margin-top:40px; text-align:center; font-size:12px; opacity:0.4; padding-bottom: 20px; }
    </style>
</head>
<body>

    <h1>🛢️ Oil Guide Pro</h1>

    <div id="logoContainer"></div>

    <div class="card">
        <select id="brand" onchange="loadModels()">
            <option value="">-- MARCA --</option>
            <option value="kia">KIA</option>
            <option value="nissan">NISSAN</option>
        </select>
        <select id="model" onchange="loadYears()">
            <option value="">-- MODELO --</option>
        </select>
        <select id="year">
            <option value="">-- AÑO --</option>
        </select>
        <button onclick="buscarAceite()">CONSULTAR DATOS</button>
    </div>

    <div id="resultado"></div>

    <div id="correctionBox" class="card" style="display:none;">
        <h3 style="margin-top:0; font-size:16px;">📝 Notas Técnicas</h3>
        <textarea id="note" placeholder="Ej: Revisar empaque..."></textarea>
        <button class="btn-green" onclick="guardarNota()">GUARDAR NOTA</button>
    </div>

    <div class="card" style="border-color: #3da9fc;">
        <button class="btn-update" onclick="checkUpdates()">🔄 BUSCAR ACTUALIZACIONES</button>
    </div>

    <div id="historialSection">
        <h3 style="color:#888; font-size:16px;">Consultas Recientes</h3>
        <div id="listaHistorial"></div>
    </div>

    <footer>Versión 2.3 · Ismael Bigio</footer>

<script>
const logos = {
    kia: `<svg viewBox="0 0 100 25" xmlns="http://www.w3.org/2000/svg"><path d="M25 0l-7 13.5L11 0H0l12.5 25L25 0zm25 0h-11v25h11V0zm39 0h-11l-12.5 25H53l12.5-25h11l12.5 25H100z" fill="#BB162B"/></svg>`,
    nissan: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="45" fill="none" stroke="white" stroke-width="5"/><rect x="5" y="40" width="90" height="20" fill="#0f1115" stroke="white" stroke-width="4"/><text x="50" y="55" font-family="Arial" font-weight="bold" font-size="14" text-anchor="middle" fill="white">NISSAN</text></svg>`
};

function oilData(v1, q1, v2, q2) {
    const obj = {};
    for (let y = 2015; y <= 2026; y++) { 
        obj[y] = (y < 2021) ? { vis: v1, qty: q1 } : { vis: v2, qty: q2 };
    }
    return obj;
}

const kiaData = {
    "Cadenza": oilData("5W-20", "5.1 qts", "5W-20", "5.1 qts"),
    "Carnival": oilData("0W-20", "6.5 qts", "0W-20", "6.5 qts"),
    "EV6": { 2021: {vis:"N/A (Eléctrico)", qty:"N/A"}, 2022: {vis:"N/A", qty:"N/A"}, 2023: {vis:"N/A", qty:"N/A"}, 2024: {vis:"N/A", qty:"N/A"}, 2025: {vis:"N/A", qty:"N/A"}, 2026: {vis:"N/A", qty:"N/A"} },
    "Forte": oilData("5W-20", "4.2 qts", "0W-20", "4.2 qts"),
    "Forte5": oilData("5W-20", "4.2 qts", "0W-20", "4.2 qts"),
    "K4": { 2024: {vis:"0W-20", qty:"4.2 qts"}, 2025: {vis:"0W-20", qty:"4.2 qts"}, 2026: {vis:"0W-20", qty:"4.2 qts"} },
    "K5": oilData("5W-20", "5.1 qts", "0W-20", "5.1 qts"),
    "Niro": oilData("0W-20", "4.0 qts", "0W-20", "4.0 qts"),
    "Optima": oilData("5W-20", "5.1 qts", "0W-20", "5.1 qts"),
    "Rio": oilData("5W-20", "3.5 qts", "5W-20", "3.7 qts"),
    "Rio5": oilData("5W-20", "3.5 qts", "5W-20", "3.7 qts"),
    "Seltos": oilData("0W-20", "4.2 qts", "0W-20", "4.2 qts"),
    "Sorento": oilData("5W-20", "6.1 qts", "0W-20", "6.1 qts"),
    "Soul": oilData("5W-20", "4.2 qts", "0W-20", "4.2 qts"),
    "Sportage": oilData("5W-20", "5.1 qts", "0W-20", "5.1 qts"),
    "Stinger": oilData("5W-30", "7.3 qts", "5W-30", "7.3 qts"),
    "Telluride": oilData("5W-30", "6.5 qts", "5W-30", "6.5 qts")
};

const nissanData = {
    "Altima": oilData("0W-20", "5.1 qts", "0W-20", "5.1 qts"),
    "Armada": oilData("5W-30", "6.9 qts", "5W-30", "6.9 qts"),
    "Frontier": oilData("5W-30", "5.4 qts", "5W-30", "5.6 qts"),
    "Juke": oilData("5W-30", "4.2 qts", "5W-30", "4.2 qts"),
    "Kicks": oilData("0W-20", "4.4 qts", "0W-20", "4.4 qts"),
    "Leaf": oilData("N/A", "N/A", "N/A", "N/A"),
    "Maxima": oilData("5W-30", "5.1 qts", "5W-30", "5.1 qts"),
    "Murano": oilData("5W-30", "5.1 qts", "5W-30", "5.1 qts"),
    "NV200": oilData("5W-30", "4.2 qts", "5W-30", "4.2 qts"),
    "Pathfinder": oilData("5W-30", "5.1 qts", "0W-20", "5.4 qts"),
    "Rogue": oilData("5W-30", "4.9 qts", "0W-20", "5.1 qts"),
    "Rogue Sport": oilData("5W-30", "4.0 qts", "0W-20", "4.0 qts"),
    "Sentra": oilData("5W-30", "4.2 qts", "0W-20", "4.4 qts"),
    "Titan": oilData("5W-30", "6.9 qts", "5W-30", "6.9 qts"),
    "Versa": oilData("5W-30", "3.7 qts", "0W-20", "4.2 qts"),
    "Versa Note": oilData("5W-30", "3.7 qts", "0W-20", "4.2 qts"),
    "Xterra": oilData("5W-30", "5.4 qts", "5W-30", "5.4 qts")
};

function loadModels() {
    const brand = document.getElementById("brand").value;
    const modelDropdown = document.getElementById("model");
    const container = document.getElementById("logoContainer");
    modelDropdown.innerHTML = '<option value="">-- MODELO --</option>';
    container.innerHTML = logos[brand] || "";
    if (!brand) return;
    const models = brand === "kia" ? Object.keys(kiaData) : Object.keys(nissanData);
    models.sort().forEach(m => {
        let el = document.createElement("option");
        el.textContent = m; el.value = m;
        modelDropdown.appendChild(el);
    });
}

function loadYears() {
    const brand = document.getElementById("brand").value;
    const model = document.getElementById("model").value;
    const yearDropdown = document.getElementById("year");
    yearDropdown.innerHTML = '<option value="">-- AÑO --</option>';
    if (!model) return;
    const data = brand === "kia" ? kiaData[model] : nissanData[model];
    Object.keys(data).sort((a,b)=>b-a).forEach(y => {
        let el = document.createElement("option");
        el.textContent = y; el.value = y;
        yearDropdown.appendChild(el);
    });
}

function buscarAceite() {
    const b = document.getElementById("brand").value;
    const m = document.getElementById("model").value;
    const y = document.getElementById("year").value;
    if (!y) { alert("Selecciona todos los campos"); return; }
    const info = b === "kia" ? kiaData[m][y] : nissanData[m][y];
    const storageKey = `note_${b}_${m}_${y}`;
    const savedNote = localStorage.getItem(storageKey) || "";
    const resDiv = document.getElementById("resultado");
    resDiv.style.display = "block";
    resDiv.innerHTML = `
        <span class="data-label">VISCOSIDAD:</span>
        <span class="data-value">${info.vis}</span>
        <span class="data-label">CANTIDAD:</span>
        <span class="data-value">${info.qty}</span>
        ${savedNote ? `<div style="margin-top:15px; color:#2ecc71; font-size:14px; border-top:1px solid #333; padding-top:10px;"><strong>Nota:</strong> ${savedNote}</div>` : ''}
    `;
    document.getElementById("correctionBox").style.display = "block";
    document.getElementById("note").value = savedNote;
    agregarHistorial(b, m, y);
}

function guardarNota() {
    const b = document.getElementById("brand").value;
    const m = document.getElementById("model").value;
    const y = document.getElementById("year").value;
    localStorage.setItem(`note_${b}_${m}_${y}`, document.getElementById("note").value);
    alert("¡Nota guardada!");
    buscarAceite();
}

function agregarHistorial(b, m, y) {
    let hist = JSON.parse(localStorage.getItem("historial") || "[]");
    const item = `${b.toUpperCase()} ${m} (${y})`;
    hist = hist.filter(h => h !== item);
    hist.unshift(item);
    hist = hist.slice(0, 5);
    localStorage.setItem("historial", JSON.stringify(hist));
    renderHistorial();
}

function renderHistorial() {
    const hist = JSON.parse(localStorage.getItem("historial") || "[]");
    document.getElementById("listaHistorial").innerHTML = hist.map(h => `<div class="hist-item">${h}</div>`).join('');
}

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(reg => {
        reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    if (confirm("¡Nueva actualización disponible!")) { window.location.reload(); }
                }
            });
        });
    });
}

function checkUpdates() {
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistration().then(reg => {
            if (reg) { reg.update().then(() => alert("Buscando cambios...")); }
        });
    }
}
renderHistorial();
</script>
</body>
</html>
