<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIA & NISSAN Oil Guide</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  padding: 15px;
}
h1 {
  text-align: center;
}
select, button, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}
#resultado {
  margin-top: 20px;
  padding: 15px;
  background: #ffffff;
  border-radius: 6px;
  font-size: 18px;
  text-align: center;
}
#correctionBox {
  display: none;
  margin-top: 15px;
}
footer {
  margin-top: 40px;
  text-align: center;
  font-size: 12px;
  opacity: .6;
}
</style>
</head>

<body>

<h1>🛢️ Oil Guide</h1>

<select id="brand" onchange="loadModels()">
  <option value="">Marca</option>
  <option value="kia">KIA</option>
  <option value="nissan">NISSAN</option>
</select>

<select id="model" onchange="loadYears()">
  <option value="">Modelo</option>
</select>

<select id="year">
  <option value="">Año</option>
</select>

<button onclick="buscarAceite()">Ver aceite</button>

<div id="resultado"></div>

<div id="correctionBox">
  <textarea id="nota" placeholder="Ej: Mecánico indica 0W-20 en vez de 5W-20"></textarea>
  <button onclick="guardarNota()">Guardar nota</button>
</div>

<footer id="app-version"></footer>

<script>
// ================== DATOS ==================

const kiaModels = {
  "Forte": {2015:"5W-20",2016:"5W-20",2017:"5W-20",2018:"5W-20",2019:"5W-20",2020:"5W-20",2021:"5W-20",2022:"5W-20",2023:"5W-20",2024:"0W-20"},
  "K4": {2024:"0W-20",2025:"0W-20",2026:"0W-20"},
  "Sportage": {2015:"5W-20",2016:"5W-20",2017:"5W-20",2018:"5W-20",2019:"5W-20",2020:"5W-20",2021:"5W-20",2022:"0W-20",2023:"0W-20",2024:"0W-20",2025:"0W-20",2026:"0W-20"},
  "Sorento": {2015:"5W-20",2016:"5W-20",2017:"5W-20",2018:"5W-20",2019:"5W-20",2020:"5W-20",2021:"0W-20",2022:"0W-20",2023:"0W-20",2024:"0W-20",2025:"0W-20",2026:"0W-20"},
  "Telluride": {2020:"5W-30",2021:"5W-30",2022:"5W-30",2023:"5W-30",2024:"5W-30",2025:"5W-30",2026:"5W-30"}
};

const nissanModels = {
  "Sentra": {2015:"5W-30",2016:"5W-30",2017:"5W-30",2018:"5W-30",2019:"5W-30",2020:"0W-20",2021:"0W-20",2022:"0W-20",2023:"0W-20",2024:"0W-20",2025:"0W-20",2026:"0W-20"},
  "Altima": {2015:"0W-20",2016:"0W-20",2017:"0W-20",2018:"0W-20",2019:"0W-20",2020:"0W-20",2021:"0W-20",2022:"0W-20",2023:"0W-20",2024:"0W-20",2025:"0W-20",2026:"0W-20"},
  "Rogue": {2015:"5W-30",2016:"5W-30",2017:"5W-30",2018:"5W-30",2019:"5W-30",2020:"0W-20",2021:"0W-20",2022:"0W-20",2023:"0W-20",2024:"0W-20",2025:"0W-20",2026:"0W-20"},
  "Frontier": {2015:"5W-30",2016:"5W-30",2017:"5W-30",2018:"5W-30",2019:"5W-30",2020:"5W-30",2021:"5W-30",2022:"5W-30",2023:"5W-30",2024:"5W-30",2025:"5W-30",2026:"5W-30"},
  "Pathfinder": {2015:"5W-30",2016:"5W-30",2017:"5W-30",2018:"5W-30",2019:"5W-30",2020:"0W-20",2021:"0W-20",2022:"0W-20",2023:"0W-20",2024:"0W-20",2025:"0W-20",2026:"0W-20"}
};

// ================== FUNCIONES ==================

function loadModels() {
  const brand = document.getElementById("brand").value;
  const model = document.getElementById("model");
  model.innerHTML = '<option value="">Modelo</option>';

  const data = brand === "kia" ? kiaModels : nissanModels;
  for (let m in data) {
    model.innerHTML += `<option value="${m}">${m}</option>`;
  }
}

function loadYears() {
  const brand = document.getElementById("brand").value;
  const model = document.getElementById("model").value;
  const year = document.getElementById("year");
  year.innerHTML = '<option value="">Año</option>';

  const data = brand === "kia" ? kiaModels : nissanModels;
  for (let y in data[model]) {
    year.innerHTML += `<option value="${y}">${y}</option>`;
  }
}

function buscarAceite() {
  const brand = document.getElementById("brand").value;
  const model = document.getElementById("model").value;
  const year = document.getElementById("year").value;

  if (!brand || !model || !year) return;

  const data = brand === "kia" ? kiaModels : nissanModels;
  const aceite = data[model][year];

  document.getElementById("resultado").innerHTML =
    `Aceite recomendado: <strong>${aceite}</strong>`;

  document.getElementById("correctionBox").style.display = "block";
}

function guardarNota() {
  alert("Nota guardada (local)");
}

// ================== VERSION ==================
document.getElementById("app-version").textContent =
  "Versión 1.3.0 · Creado por Ismael Bigio";

</script>

</body>
</html>
